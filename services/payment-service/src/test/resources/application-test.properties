# Integration test properties — connects to the running dev containers.
# Start first: docker-compose -f infrastructure/docker/docker-compose.yml up -d postgres-payment redis

spring.datasource.url=jdbc:postgresql://localhost:5434/payment_db
spring.datasource.username=payment_user
spring.datasource.password=payment_secret
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.clean-on-validation-error=false

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=redis_secret

# Disable Kafka auto-config — consumer and producer are mocked in IT
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration


logging.level.com.parkride=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG
