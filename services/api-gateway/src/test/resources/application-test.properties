# ── Test profile ─────────────────────────────────────────────────────────────
# Complete route override — all 5 routes point to WireMock on fixed port 18080.
# No rate limiting, no circuit breaker (Redis is excluded below).

spring.cloud.gateway.default-filters=

# [0] Auth — no JWT required
spring.cloud.gateway.routes[0].id=auth-test
spring.cloud.gateway.routes[0].uri=http://localhost:18080
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

# [1] Parking — JWT required
spring.cloud.gateway.routes[1].id=parking-test
spring.cloud.gateway.routes[1].uri=http://localhost:18080
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/parking/**
spring.cloud.gateway.routes[1].filters[0]=AuthenticationFilter

# [2] WebSocket — JWT required
spring.cloud.gateway.routes[2].id=ws-test
spring.cloud.gateway.routes[2].uri=ws://localhost:18080
spring.cloud.gateway.routes[2].predicates[0]=Path=/ws/**
spring.cloud.gateway.routes[2].filters[0]=AuthenticationFilter

# [3] Payment — JWT required
spring.cloud.gateway.routes[3].id=payment-test
spring.cloud.gateway.routes[3].uri=http://localhost:18080
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/payments/**
spring.cloud.gateway.routes[3].filters[0]=AuthenticationFilter

# [4] Pricing — JWT required
spring.cloud.gateway.routes[4].id=pricing-test
spring.cloud.gateway.routes[4].uri=http://localhost:18080
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/pricing/**
spring.cloud.gateway.routes[4].filters[0]=AuthenticationFilter

# ── Exclude Redis & Gateway rate-limit auto-configuration ────────────────────
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration,\
  org.springframework.boot.autoconfigure.session.SessionAutoConfiguration,\
  org.springframework.cloud.gateway.config.GatewayRedisAutoConfiguration

# ── Misc ─────────────────────────────────────────────────────────────────────
management.tracing.sampling.probability=0.0
logging.level.com.parkride=DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG
