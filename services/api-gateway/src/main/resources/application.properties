# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
spring.application.name=api-gateway
spring.profiles.active=local

# ── Redis (token-bucket rate limiter) ────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=4

# Gateway is stateless — no Redis session store
spring.session.store-type=none

# ── Cloud Gateway global settings ─────────────────────────────────────────────
spring.cloud.gateway.x-forwarded.enabled=true

# Global filters (CorrelationIdFilter, RequestLoggingFilter) implement GlobalFilter
# and are applied automatically by Spring Cloud Gateway — no explicit registration needed.

# ── Routes ────────────────────────────────────────────────────────────────────

# [0] Auth — no JWT required (login / register / refresh)
spring.cloud.gateway.routes[0].id=auth-route
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**
spring.cloud.gateway.routes[0].filters[0].name=RequestRateLimiter
spring.cloud.gateway.routes[0].filters[0].args.redis-rate-limiter.replenishRate=20
spring.cloud.gateway.routes[0].filters[0].args.redis-rate-limiter.burstCapacity=40
spring.cloud.gateway.routes[0].filters[0].args.key-resolver=#{@ipKeyResolver}

# [1] Parking — JWT required
spring.cloud.gateway.routes[1].id=parking-route
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/parking/**
spring.cloud.gateway.routes[1].filters[0]=AuthenticationFilter
spring.cloud.gateway.routes[1].filters[1].name=RequestRateLimiter
spring.cloud.gateway.routes[1].filters[1].args.redis-rate-limiter.replenishRate=100
spring.cloud.gateway.routes[1].filters[1].args.redis-rate-limiter.burstCapacity=200
spring.cloud.gateway.routes[1].filters[1].args.key-resolver=#{@userKeyResolver}
spring.cloud.gateway.routes[1].filters[2].name=CircuitBreaker
spring.cloud.gateway.routes[1].filters[2].args.name=parking-cb
spring.cloud.gateway.routes[1].filters[2].args.fallbackUri=forward:/fallback

# [2] WebSocket — parking availability broadcasts
spring.cloud.gateway.routes[2].id=ws-route
spring.cloud.gateway.routes[2].uri=ws://localhost:8082
spring.cloud.gateway.routes[2].predicates[0]=Path=/ws/**
spring.cloud.gateway.routes[2].filters[0]=AuthenticationFilter

# [3] Payment — JWT required
spring.cloud.gateway.routes[3].id=payment-route
spring.cloud.gateway.routes[3].uri=http://localhost:8083
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/payments/**
spring.cloud.gateway.routes[3].filters[0]=AuthenticationFilter
spring.cloud.gateway.routes[3].filters[1].name=RequestRateLimiter
spring.cloud.gateway.routes[3].filters[1].args.redis-rate-limiter.replenishRate=100
spring.cloud.gateway.routes[3].filters[1].args.redis-rate-limiter.burstCapacity=200
spring.cloud.gateway.routes[3].filters[1].args.key-resolver=#{@userKeyResolver}
spring.cloud.gateway.routes[3].filters[2].name=CircuitBreaker
spring.cloud.gateway.routes[3].filters[2].args.name=payment-cb
spring.cloud.gateway.routes[3].filters[2].args.fallbackUri=forward:/fallback

# [4] Pricing — JWT required
spring.cloud.gateway.routes[4].id=pricing-route
spring.cloud.gateway.routes[4].uri=http://localhost:8085
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/pricing/**
spring.cloud.gateway.routes[4].filters[0]=AuthenticationFilter
spring.cloud.gateway.routes[4].filters[1].name=RequestRateLimiter
spring.cloud.gateway.routes[4].filters[1].args.redis-rate-limiter.replenishRate=100
spring.cloud.gateway.routes[4].filters[1].args.redis-rate-limiter.burstCapacity=200
spring.cloud.gateway.routes[4].filters[1].args.key-resolver=#{@userKeyResolver}
spring.cloud.gateway.routes[4].filters[2].name=CircuitBreaker
spring.cloud.gateway.routes[4].filters[2].args.name=pricing-cb
spring.cloud.gateway.routes[4].filters[2].args.fallbackUri=forward:/fallback

# [5] Ride — JWT required
spring.cloud.gateway.routes[5].id=ride-route
spring.cloud.gateway.routes[5].uri=http://localhost:8086
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/rides/**,/api/v1/drivers/**
spring.cloud.gateway.routes[5].filters[0]=AuthenticationFilter
spring.cloud.gateway.routes[5].filters[1].name=RequestRateLimiter
spring.cloud.gateway.routes[5].filters[1].args.redis-rate-limiter.replenishRate=200
spring.cloud.gateway.routes[5].filters[1].args.redis-rate-limiter.burstCapacity=400
spring.cloud.gateway.routes[5].filters[1].args.key-resolver=#{@userKeyResolver}
spring.cloud.gateway.routes[5].filters[2].name=CircuitBreaker
spring.cloud.gateway.routes[5].filters[2].args.name=ride-cb
spring.cloud.gateway.routes[5].filters[2].args.fallbackUri=forward:/fallback

# ── Resilience4j circuit-breaker ──────────────────────────────────────────────
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.parking-cb.base-config=default
resilience4j.circuitbreaker.instances.payment-cb.base-config=default
resilience4j.circuitbreaker.instances.pricing-cb.base-config=default
resilience4j.circuitbreaker.instances.ride-cb.base-config=default
resilience4j.timelimiter.configs.default.timeout-duration=5s

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.prometheus.metrics.export.enabled=true
management.tracing.sampling.probability=1.0

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.parkride=DEBUG
logging.level.org.springframework.cloud.gateway=INFO
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
