# ── Test profile overrides ────────────────────────────────────────────────────
# Actual JDBC URL and credentials are overridden at runtime by
# @DynamicPropertySource in AuthControllerIT using the Testcontainers container.

spring.datasource.url=jdbc:tc:postgresql:16-alpine:///auth_db
spring.datasource.username=test
spring.datasource.password=test
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.enabled=true

# Redis port distinct from dev; overridden by @DynamicPropertySource in IT
spring.data.redis.host=localhost
spring.data.redis.port=6370

# Overridden by @EmbeddedKafka in IT
spring.kafka.bootstrap-servers=localhost:9093

# Disable Redis session store in tests
spring.session.store-type=none

# JWT uses RS256 — keys loaded from classpath:keys/private.pem and public.pem (no secret needed)

# No distributed tracing in tests
management.tracing.sampling.probability=0.0

logging.level.com.parkride=DEBUG
logging.level.org.springframework.security=DEBUG
