server.port=8081

spring.application.name=auth-service

# ── Database ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/auth_db
spring.datasource.username=auth_user
spring.datasource.password=${DB_AUTH_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=public

# ── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# ── Redis ────────────────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=4

# ── Kafka ────────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true

# ── Session ───────────────────────────────────────────────────────────────────
spring.session.store-type=redis
spring.session.timeout=30m

# ── Security ──────────────────────────────────────────────────────────────────
# JWT signing uses RS256 (asymmetric RSA).
# Keys loaded from classpath:keys/private.pem and classpath:keys/public.pem
# Production: mount keys via Kubernetes Secret (never commit production keys).

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.prometheus.metrics.export.enabled=true
management.tracing.sampling.probability=1.0

# ── OpenTelemetry ─────────────────────────────────────────────────────────────
otel.exporter.otlp.endpoint=http://localhost:4317
otel.service.name=auth-service

# ── SpringDoc / Swagger UI ────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.api-docs.path=/v3/api-docs

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.parkride=DEBUG
logging.level.org.springframework.security=INFO
# Suppress intentional warning: DaoAuthenticationProvider @Bean takes precedence over
# UserDetailsService auto-configuration — this is by design (custom BCrypt + lockout logic).
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
