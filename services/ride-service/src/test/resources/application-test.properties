# Test profile — H2 in-memory DB, all external infra mocked/disabled.

spring.datasource.url=jdbc:h2:mem:ridedb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.flyway.enabled=false

# Disable Redis health check — Redis is mocked, not running
management.health.redis.enabled=false

# Redis — port intentionally unreachable; RedisConnectionFactory is @MockitoBean in IT.
# Exclude the reactive Redis auto-configs so the actuator health check doesn't
# try to build a ReactiveRedisConnectionFactory from the mocked factory.
spring.data.redis.host=localhost
spring.data.redis.port=6370
spring.data.redis.password=
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration,\
  org.springframework.boot.actuate.autoconfigure.data.redis.RedisReactiveHealthContributorAutoConfiguration

# Kafka — listener auto-startup disabled; RideEventPublisher is @MockitoBean in IT
spring.kafka.bootstrap-servers=localhost:9093
spring.kafka.listener.auto-startup=false
spring.kafka.consumer.group-id=ride-service-test
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=com.parkride.events

logging.level.com.parkride.ride=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.kafka=ERROR
