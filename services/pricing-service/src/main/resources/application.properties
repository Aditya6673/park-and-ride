server.port=8085

spring.application.name=pricing-service

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5435/pricing_db
spring.datasource.username=pricing_user
spring.datasource.password=${DB_PRICING_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=public

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# ── Redis — occupancy counters + price cache (30s TTL) ────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=4

# ── Kafka — consumer only (no producer) ───────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=pricing-service-consumers
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.enable-auto-commit=false

# Topic names — must match docker-compose kafka-init
spring.kafka.topics.booking-events=booking-events

# Cache TTL (seconds)
pricing.cache.ttl-seconds=30

# ── Security ──────────────────────────────────────────────────────────────────
security.jwt.secret=${SECURITY_JWT_SECRET:}

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.prometheus.metrics.export.enabled=true
management.tracing.sampling.probability=1.0

# ── SpringDoc / Swagger UI ────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.api-docs.path=/v3/api-docs

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.parkride=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
