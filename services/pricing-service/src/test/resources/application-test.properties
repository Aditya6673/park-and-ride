# Test profile — connects to running Docker containers.
# Start first:
#   docker-compose -f infrastructure/docker/docker-compose.yml up -d postgres-pricing redis

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5435/pricing_db
spring.datasource.username=pricing_user
spring.datasource.password=pricing_secret
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.clean-on-validation-error=false

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=redis_secret

# ── Kafka — excluded in controller ITs; enabled in consumer ITs via EmbeddedKafka ──
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

spring.kafka.topics.booking-events=booking-events

# ── Security ──────────────────────────────────────────────────────────────────

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.parkride=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.kafka=WARN
