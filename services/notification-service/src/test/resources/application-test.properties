# ── Embedded Kafka ────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=${spring.embedded.kafka.brokers}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.topics.booking-events=booking-events
spring.kafka.topics.payment-events=payment-events
spring.kafka.topics.user-events=user-events

# ── Email (GreenMail embedded SMTP — port configured per test class) ──────────
spring.mail.host=127.0.0.1
spring.mail.port=3025
spring.mail.username=noreply@parkride.test
spring.mail.password=testpass
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.properties.mail.smtp.connectiontimeout=3000
spring.mail.properties.mail.smtp.timeout=3000

# ── Notification config ───────────────────────────────────────────────────────
notification.email.from=Park & Ride <noreply@parkride.test>
notification.email.enabled=true
notification.auth.verification-base-url=http://localhost:8081/api/auth/verify-email
notification.auth.password-reset-base-url=http://localhost:3000/reset-password

# ── Twilio (disabled in tests — SmsService falls back to log stub) ────────────
twilio.account-sid=
twilio.auth-token=
twilio.from-number=

# ── Thymeleaf ─────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false

# ── Actuator — disable mail health check (JavaMailSender is mocked in tests) ──
management.health.mail.enabled=false

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.parkride=DEBUG
logging.level.org.springframework.kafka=WARN
logging.level.org.apache.kafka=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{30} - %msg%n
