server.port=8087

spring.application.name=notification-service
spring.profiles.active=local

# ── Kafka ─────────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-service-consumers
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

# Topic names — must match kafka-init in docker-compose.yml
spring.kafka.topics.booking-events=booking-events
spring.kafka.topics.payment-events=payment-events

# ── Email (Gmail SMTP) ────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── Thymeleaf ─────────────────────────────────────────────────────────────────
spring.thymeleaf.prefix=classpath:/templates/email/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# ── Notification config ───────────────────────────────────────────────────────
notification.email.from=Park & Ride <adityadubey9880@gmail.com>
notification.email.enabled=true

# ── Twilio SMS ────────────────────────────────────────────────────────────────
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.from-number=${TWILIO_FROM_NUMBER:}

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.probes.enabled=true
management.prometheus.metrics.export.enabled=true

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.parkride=DEBUG
logging.level.org.springframework.mail=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
