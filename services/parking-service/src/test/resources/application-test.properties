# Integration test properties — connects to the running dev containers.
# Start them first: docker-compose -f infrastructure/docker/docker-compose.yml up -d postgres-parking redis

spring.datasource.url=jdbc:postgresql://localhost:5433/parking_db
spring.datasource.username=parking_user
spring.datasource.password=parking_secret
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.clean-on-validation-error=false

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=redis_secret

# Disable Kafka auto-config — producer is mocked via @MockBean in the IT
spring.kafka.bootstrap-servers=localhost:9092
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

security.jwt.secret=test-secret-minimum-32-characters-long

logging.level.com.parkride=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG
